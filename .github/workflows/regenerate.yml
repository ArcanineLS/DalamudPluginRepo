name: Regenerate PluginMaster

on:
  workflow_dispatch:
  push:
    paths:
      - 'plugins/**'
      - 'generate_pluginmaster.py'
      - 'requirements.txt'
  schedule:
    - cron: '0 */12 * * *'

concurrency: regenerate

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Generate PluginMaster
        run: |
          pip install -r requirements.txt
          python generate_pluginmaster.py

      - name: Commit PluginMaster
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: 41898282+github-actions[bot]@users.noreply.github.com
          message: Regenerate PluginMaster
          add: pluginmaster.json
